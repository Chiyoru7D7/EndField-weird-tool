; ============================================================================
; InvisibleOp v1.1 — 131 shader hashes
; TOGGLE: F1=master  F2=operators  F3=bosses  F10=reload
;
; LEGEND: ✅=manual hunt  ⚠️=frame diff  🔲=icon  👤=operator
;         👣=shadow  ✨=VFX  💀=boss  ■=vertex shader
; ============================================================================

[Constants]
global $invisible = 1
global $hide_operators = 1
global $hide_bosses = 1

[KeyToggleInvisMaster]
Key = VK_F1
type = cycle
$invisible = 1, 0

[KeyToggleOperators]
Key = VK_F2
type = cycle
$hide_operators = 1, 0

[KeyToggleBosses]
Key = VK_F3
type = cycle
$hide_bosses = 1, 0

; ============================================================================
; COMMAND LISTS — shared logic, referenced by all shader overrides
; ============================================================================

[CommandListHideIcon]
if $invisible == 1
  handling = skip
endif

[CommandListHideOperator]
if $invisible == 1 && $hide_operators == 1
  handling = skip
endif

[CommandListHideBoss]
if $invisible == 1 && $hide_bosses == 1
  handling = skip
endif

